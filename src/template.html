<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Odin Todo List</title>
    </head>
    <body>
        <div id="root">
            <div id="sidebar"></div>
            <div id="content">
                <div id="task-groups">
                    <div id="all-tasks" class="tasks-container">
                        <h3>Tasks</h3>
                        <div class="task">
                            <div class="state">
                                <input
                                    type="checkbox"
                                    name="task-checkbox"
                                    class="task-checkbox"
                                />
                            </div>
                            <div class="body">
                                <div class="top">
                                    <div class="title">Do Washing</div>
                                    <div class="edit-task">
                                        <button
                                            class="edit-button"
                                            type="button"
                                        >
                                            Edit
                                        </button>
                                    </div>
                                </div>
                                <div class="bottom">
                                    <div class="due-date">Today 1 PM</div>
                                    <div class="tags">Chores</div>
                                </div>
                            </div>
                        </div>
                        <hr />
                    </div>
                    <div id="add-task">
                        <button id="add-task-button" type="button">
                            <i>+</i> Add Task
                        </button>
                        <div id="add-task-dialog">
                            <h2>Add new task</h2>
                            <form id="addTaskForm">
                                <div class="title-container">
                                    <label for="taskTitle">Title</label>
                                    <input
                                        required
                                        disabled
                                        type="text"
                                        name="task-title"
                                        id="taskTitle"
                                    />
                                </div>

                                <div class="description-container">
                                    <label for="taskDescription"
                                        >Description</label
                                    >
                                    <textarea
                                        required
                                        disabled
                                        name="task-description"
                                        id="taskDescription"
                                    ></textarea>
                                </div>

                                <div class="date-container">
                                    <label for="taskDate">Due Date</label>
                                    <input
                                        required
                                        disabled
                                        type="date"
                                        name="task-date"
                                        id="taskDate"
                                        placeholder="Date"
                                    />
                                </div>

                                <div class="priority-container">
                                    <label for="taskPriority">Priority</label>
                                    <input
                                        type="number"
                                        disabled
                                        name="task-priority"
                                        id="taskPriority"
                                        max="3"
                                        min="1"
                                        placeholder="1-3"
                                    />
                                </div>

                                <div class="tags-dropdown" id="tagsDropdown">
                                    Tags
                                    <div
                                        class="selected-items"
                                        id="selectedItems"
                                    ></div>
                                    <div class="dropdown" id="dropdown"></div>
                                </div>

                                <div class="submit-container">
                                    <input
                                        type="submit"
                                        id="submitNewTask"
                                        value="Submit New Task"
                                    />
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
