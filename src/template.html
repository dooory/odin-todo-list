<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Odin Todo List</title>
    </head>
    <body>
        <template id="taskTemplate">
            <div class="task">
                <div class="task-container">
                    <div class="state">
                        <input
                            type="checkbox"
                            name="task-checkbox"
                            class="task-checkbox"
                        />
                    </div>
                    <div class="body">
                        <div class="top">
                            <div class="title edit-option">Task Title</div>
                            <input
                                type="text"
                                name="edit-task-title"
                                class="edit-task-title edit-option"
                                data-property="title"
                            />
                            <div class="edit-task-buttons">
                                <button
                                    class="cancel-button edit-option"
                                    type="button"
                                >
                                    Cancel
                                </button>
                                <button
                                    class="duplicate-button edit-option"
                                    type="button"
                                >
                                    Duplicate
                                </button>
                                <button
                                    class="save-button edit-option"
                                    type="button"
                                >
                                    Save
                                </button>
                                <button
                                    class="edit-button hide-on-edit"
                                    type="button"
                                >
                                    Edit
                                </button>
                                <button class="delete-button" type="button">
                                    X
                                </button>
                            </div>
                        </div>
                        <div class="bottom">
                            <div class="due-date edit-option">Today 1 PM</div>
                            <input
                                type="date"
                                name="edit-due-date"
                                data-property="dueDate"
                                class="edit-due-date edit-option"
                            />
                        </div>
                    </div>
                </div>
                <hr />
            </div>
        </template>

        <template id="dropdownTemplate">
            <div class="dropdown-container">
                <div class="selected-entries">
                    <span class="placeholder">No tags...</span>
                </div>
                <div class="dropdown">
                    <div class="entry create-tag-entry">Create Tag...</div>
                </div>
            </div>
        </template>

        <template id="entryTemplate">
            <div class="entry">
                <p class="title">Tag Title</p>
                <!-- <button class="delete-button" type="button">X</button> -->
            </div>
        </template>

        <template id="selectedEntryTemplate">
            <span class="selected-entry">Example Entry</span>
        </template>

        <dialog id="createTagDialog" closedby="any">
            <div class="dialog-container">
                <h3>Create New Tag</h3>
                <form id="createTagForm" name="new-tag-form">
                    <div class="title-container">
                        <label for="newTagTitle">New Tag Title</label>
                        <input
                            required
                            type="text"
                            name="new-tag-title"
                            id="newTagTitle"
                        />
                    </div>
                    <div class="submit-container">
                        <input
                            type="submit"
                            value="Submit new tag"
                            id="submitTagButton"
                        />
                    </div>
                </form>
            </div>
        </dialog>
        <div id="root">
            <button
                type="button"
                onclick="
                    localStorage.clear();
                    location.reload();
                "
                id="wipeButton"
            >
                Wipe Storage
            </button>
            <div id="content">
                <div id="tasksRoot">
                    <div id="allTasks" class="tasks-container">
                        <h3>Tasks</h3>
                        <hr />
                    </div>
                    <div id="addTask">
                        <button id="addTaskButton" type="button">
                            <i>+</i> Add Task
                        </button>
                        <div id="addTaskDialog">
                            <div class="header">
                                <h2>Add new task</h2>
                                <div class="close-button-container">
                                    <button
                                        id="closeAddTaskDialog"
                                        type="button"
                                    >
                                        X
                                    </button>
                                </div>
                            </div>
                            <form id="addTaskForm">
                                <div class="title-container">
                                    <label for="taskTitle">Title</label>
                                    <input
                                        required
                                        disabled
                                        type="text"
                                        name="task-title"
                                        id="taskTitle"
                                    />
                                </div>

                                <div class="description-container">
                                    <label for="taskDescription"
                                        >Description</label
                                    >
                                    <textarea
                                        required
                                        disabled
                                        name="task-description"
                                        id="taskDescription"
                                    ></textarea>
                                </div>

                                <div class="date-container">
                                    <label for="taskDate">Due Date</label>
                                    <input
                                        required
                                        disabled
                                        type="date"
                                        name="task-date"
                                        id="taskDate"
                                        placeholder="Date"
                                    />
                                </div>

                                <div class="priority-container">
                                    <label for="taskPriority">Priority</label>
                                    <select
                                        name="task-priority"
                                        id="taskPriority"
                                        disabled
                                    >
                                        <option value="1">High</option>
                                        <option selected value="2">
                                            Medium
                                        </option>
                                        <option value="3">Low</option>
                                    </select>
                                </div>

                                <div class="submit-container">
                                    <input
                                        type="submit"
                                        id="submitNewTask"
                                        value="Submit New Task"
                                    />
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
