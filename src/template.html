<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Odin Todo List</title>
    </head>
    <body>
        <template id="taskTemplate">
            <div class="task">
                <div class="task-container">
                    <div class="state">
                        <input
                            type="checkbox"
                            name="task-checkbox"
                            class="task-checkbox"
                        />
                    </div>
                    <div class="body">
                        <div class="top">
                            <div class="title edit-option">Task Title</div>
                            <input
                                type="text"
                                name="edit-task-title"
                                class="edit-task-title edit-option"
                                data-property="title"
                            />
                            <div class="edit-task-buttons">
                                <button
                                    class="cancel-button edit-option"
                                    type="button"
                                >
                                    Cancel
                                </button>
                                <button
                                    class="duplicate-button edit-option"
                                    type="button"
                                >
                                    Duplicate
                                </button>
                                <button
                                    class="save-button edit-option"
                                    type="button"
                                >
                                    Save
                                </button>
                                <button
                                    class="edit-button hide-on-edit"
                                    type="button"
                                >
                                    Edit
                                </button>
                                <button class="delete-button" type="button">
                                    <i class="fi fi-rr-cross"></i>
                                </button>
                            </div>
                        </div>
                        <div class="bottom">
                            <div class="left-options">
                                <div class="due-date-container">
                                    <div class="due-date edit-option">
                                        Today 1 PM
                                    </div>
                                    <input
                                        type="date"
                                        name="edit-due-date"
                                        data-property="dueDate"
                                        class="edit-due-date edit-option"
                                    />
                                </div>
                                <select
                                    name="task-priority"
                                    class="edit-option edit-priority"
                                    data-property="priority"
                                >
                                    <option value="1">High</option>
                                    <option value="2">Medium</option>
                                    <option value="3">Low</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <hr />
            </div>
        </template>

        <template id="dropdownTemplate">
            <div class="dropdown-container">
                <div class="selected-entries">
                    <span class="placeholder">No tags...</span>
                </div>
                <div class="dropdown">
                    <div class="entry create-tag-entry">Create Tag...</div>
                </div>
            </div>
        </template>

        <template id="entryTemplate">
            <div class="entry">
                <span class="title">Tag Title</span>
            </div>
        </template>

        <template id="selectedEntryTemplate">
            <span class="selected-entry">Example Entry</span>
        </template>

        <template id="tagOptionTemplate">
            <div class="tag-option">
                <input
                    type="text"
                    name="tag-title"
                    value="Example Tag"
                    class="tag-title-input"
                />
                <span class="tag-title-text">Example Tag</span>
                <div class="option-buttons">
                    <button
                        type="button"
                        class="save-tag-button"
                        title="Save changes"
                    >
                        <i class="fi fi-rr-disk" title="Save changes"></i>
                    </button>
                    <button
                        type="button"
                        class="rename-tag-button"
                        title="Rename tag"
                    >
                        <i class="fi fi-rr-edit" title="Rename tag"></i>
                    </button>
                    <button
                        title="Delete tag"
                        type="button"
                        class="delete-tag-button"
                    >
                        <i class="fi fi-rr-cross-circle"></i>
                    </button>
                </div>
            </div>
        </template>

        <dialog id="manageTagsDialog" closedby="any">
            <div class="container">
                <div class="header">
                    <h2>Tags</h2>
                </div>
                <hr />

                <div class="tags-list">
                    <button class="create-tag-option">
                        <span class="option-title">Create Tag</span>
                        <i class="fi fi-rr-square-plus"></i>
                    </button>
                    <form
                        id="createTagForm"
                        class="create-tag-form"
                        method="post"
                        name="create-tag-form"
                    >
                        <input
                            type="text"
                            name="tag-title"
                            placeholder="Tag title..."
                            id="createTagTitle"
                            required
                        />
                        <div class="option-buttons">
                            <button
                                class="create-tag-button"
                                id="createTagButton"
                                title="Create tag"
                            >
                                <i class="fi fi-rr-disk"></i>
                            </button>
                            <button
                                type="button"
                                class="cancel-create-tag-button"
                                id="cancelCreateTagButton"
                                title="Cancel creating tag"
                            >
                                <i class="fi fi-rr-cross-circle"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </dialog>

        <div id="root">
            <button
                type="button"
                onclick="
                    localStorage.clear();
                    location.reload();
                "
                id="wipeButton"
            >
                Wipe Storage
            </button>
            <div id="content">
                <div class="header">
                    <form class="search-form" id="filterForm">
                        <input
                            type="search"
                            name="search-tasks"
                            id="searchTasks"
                            class="search-tasks"
                            placeholder="Search tasks"
                            title="Filter by task title"
                        />
                        <select
                            name="search-tags"
                            class="search-tags"
                            id="searchTags"
                            title="Filter by tags"
                        >
                            <option selected value="all">All tags</option>
                            <option value="example">Example Tag</option>
                            <option value="other">Other Tag</option>
                        </select>
                        <button
                            class="clear-search-button"
                            id="clearFilter"
                            title="Clear filter"
                        >
                            <i class="fi fi-rr-cross"></i>
                        </button>
                    </form>
                    <div class="header-options">
                        <button
                            type="button"
                            class="options-button"
                            id="showTagsManager"
                        >
                            Manage Tags
                        </button>
                    </div>
                </div>
                <div id="tasksRoot">
                    <div id="allTasks" class="tasks-container">
                        <h3>Tasks</h3>
                        <hr />
                    </div>
                    <div id="addTask">
                        <button id="addTaskButton" type="button">
                            <i class="fi fi-rr-plus"></i> Add Task
                        </button>
                        <div id="addTaskDialog">
                            <div class="header">
                                <h2>Add new task</h2>
                                <div class="close-button-container">
                                    <button
                                        id="closeAddTaskDialog"
                                        type="button"
                                    >
                                        <i class="fi fi-rr-cross"></i>
                                    </button>
                                </div>
                            </div>
                            <form id="addTaskForm">
                                <div class="title-container">
                                    <label for="taskTitle">Title</label>
                                    <input
                                        required
                                        disabled
                                        type="text"
                                        name="task-title"
                                        id="taskTitle"
                                    />
                                </div>

                                <div class="date-container">
                                    <label for="taskDate">Due Date</label>
                                    <input
                                        required
                                        disabled
                                        type="date"
                                        name="task-date"
                                        id="taskDate"
                                        placeholder="Date"
                                    />
                                </div>

                                <div class="priority-container">
                                    <label for="taskPriority">Priority</label>
                                    <select
                                        name="task-priority"
                                        id="taskPriority"
                                        disabled
                                    >
                                        <option value="1">High</option>
                                        <option selected value="2">
                                            Medium
                                        </option>
                                        <option value="3">Low</option>
                                    </select>
                                </div>

                                <div class="submit-container">
                                    <input
                                        type="submit"
                                        id="submitNewTask"
                                        value="Submit New Task"
                                    />
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            Uicons by <a href="https://www.flaticon.com/uicons">Flaticon</a>
        </footer>
    </body>
</html>
